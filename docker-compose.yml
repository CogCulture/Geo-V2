services:
  backend:
    build: ./GEO-backend
    ports:
      - "8000:8000"    # Allow access from Load Balancer
    env_file:
      - ./GEO-backend/.env
    environment:
      - SELENIUM_URL=http://selenium-chrome:4444/wd/hub
      - FRONTEND_URL=https://${VM_IP}
      - ALLOWED_ORIGINS=https://${VM_IP},http://${VM_IP},https://optimiseurbrand.tech,https://geo.optimiseurbrand.tech
    volumes:
      - ./GEO-backend/analysis_database.db:/app/analysis_database.db
      - ./GEO-backend/brand_visibility.db:/app/brand_visibility.db
    depends_on:
      - selenium-chrome
    restart: unless-stopped

  frontend:
    build:
      context: ./GEO-frontend
      args:
        - NEXT_PUBLIC_API_URL=/api    # ← Use relative path to avoid Mixed Content errors on HTTPS
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        - NEXT_PUBLIC_RAZORPAY_KEY_ID=${NEXT_PUBLIC_RAZORPAY_KEY_ID}
    ports:
      - "3000:3000"    # Allow access from Load Balancer
    env_file:
      - ./GEO-frontend/.env.local
    environment:
      - FASTAPI_BASE_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  selenium-chrome:
    image: selenium/standalone-chrome:latest
    shm_size: 2gb
    ports:
      - "127.0.0.1:4444:4444"    # ← Lock this down too
    restart: unless-stopped
